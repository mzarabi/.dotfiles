schemaVersion = 1

[catalogConfiguration]
customFolders = []
scriptsDirectories = []

    [[catalogConfiguration.folderDepthOverrides]]
    catalogIdentifier = 'TunaCore.UserFoldersCatalog'
    depthRawValue = 4

    [[catalogConfiguration.folderDepthOverrides]]
    catalogIdentifier = 'TunaSystem.PreferencePanesCatalog'
    depthRawValue = 1

[[catalogs.sortOrders]]
catalogIdentifier = 'Tuna.Internal.ClipboardProxyCatalog'
sortOrder = 'capturedAt.desc'

[extensions]
enabledIdentifiers = [
    'com.brnbw.tuna.plugins.brew',
    'com.brnbw.tuna.plugins.cleanshot',
    'com.brnbw.tuna.plugins.notes',
    'com.brnbw.tuna.plugins.reminders'
]

[hotkeys]
custom = []

    [hotkeys.app.activate]
    carbonKeyCode = 49
    carbonModifiers = 256

    [hotkeys.app.leaderMode]
    carbonKeyCode = 105
    carbonModifiers = 0

[[leaderMode.bindings]]
key = 'b'
url = 'tuna://run/path.%252FApplications%252FZen.app/Open'

[[leaderMode.bindings]]
key = 'o'
url = 'tuna://run/path.%252FApplications%252FMicrosoft%2520Outlook.app/Open'

[[leaderMode.bindings]]
key = 'f'
url = 'tuna://run/path.%252FSystem%252FLibrary%252FCoreServices%252FFinder.app/Open'

[[leaderMode.bindings]]
key = 'i'
url = 'tuna://run/path.%252FApplications%252FIntelliJ%2520IDEA.app/Open'

[[leaderMode.bindings]]
iconPath = 'message'
key = 'm'
label = 'Message'

    [[leaderMode.bindings.children]]
    key = 'm'
    url = 'tuna://run/path.%252FSystem%252FApplications%252FMessages.app/Open'

    [[leaderMode.bindings.children]]
    key = 's'
    url = 'tuna://run/path.%252FApplications%252FSlack.app/Open'

    [[leaderMode.bindings.children]]
    key = 't'
    url = 'tuna://run/path.%252FApplications%252FMicrosoft%2520Teams.app/Open'

[[leaderMode.bindings]]
key = 'n'
url = 'tuna://run/TunaCore.AllApplicationsCatalog.Bear/Open'

[[leaderMode.bindings]]
iconPath = 'person.2'
key = 'q'
label = 'Quit Work'

    [[leaderMode.bindings.children]]
    key = 'a'
    url = 'tuna://run/TunaCore.AllApplicationsCatalog.Microsoft%20Teams/TunaCore.CommonActionsCatalog.Quit'

    [[leaderMode.bindings.children]]
    key = 'o'
    url = 'tuna://run/TunaCore.AllApplicationsCatalog.Microsoft%20Outlook/TunaCore.CommonActionsCatalog.Quit'

    [[leaderMode.bindings.children]]
    key = 's'
    url = 'tuna://run/TunaCore.AllApplicationsCatalog.Slack/TunaCore.CommonActionsCatalog.Quit'

[[leaderMode.bindings]]
key = 's'
url = 'tuna://run/TunaCore.AllApplicationsCatalog.Spotify/Open'

[[leaderMode.bindings]]
key = 't'
url = 'tuna://run/TunaCore.AllApplicationsCatalog.Ghostty/Open'

[[leaderMode.bindings]]
iconPath = 'bolt'
key = 'a'
label = 'Action'

    [[leaderMode.bindings.children]]
    key = 's'
    url = 'tuna://run/TunaAutomation.SystemTasksCatalog.Sleep/TunaCore.CommonActionsCatalog.Run%20in%20Background'

    [[leaderMode.bindings.children]]
    key = 'p'
    url = 'tuna://run/TunaSystem.ColorToolsCatalog.Pick%20Color/TunaCore.CommonActionsCatalog.Run'

    [[leaderMode.bindings.children]]
    key = 'c'
    url = 'tuna://run/Tuna.Internal.ClipboardProxyCatalog.Clipboard%20History/Tuna.BasicActionsCatalog.Browse'

[[leaderMode.bindings]]
key = 'e'
url = 'tuna://run/TunaCore.AllApplicationsCatalog.Zed/Open'

[[leaderMode.bindings]]
key = 'v'
url = 'tuna://run/path.%252FApplications%252FVisual%2520Studio%2520Code.app/Open'

[[leaderMode.bindings]]
key = 'd'
url = 'tuna://run/TunaCore.AllApplicationsCatalog.DataGrip/Open'

[settings]
activationDoublePressTrigger = 'leftCommand'
catalogPeriodicRescanIntervalMinutes = 60
leaderModeCheatsheetBehavior = 'never'
leaderModeCheatsheetDelayMS = 3000
leaderModeCheatsheetShowDetails = false
leaderModeModifierConfiguration = 'optionGroupControlSticky'
leaderModeModifierTrigger = 'rightOption'
leaderModeThemeStyle = 'breadcrumb'
mainWindowAnimationsEnabled = false
physicalHyperKeyQuickPressBehavior = 'togglesCapsLock'
physicalHyperKeySource = 'capsLock'
resultListNavigationBindings = 'vimStyle'
screenPreference = 'primary'
shelfAutoCloseWhenTasksComplete = true
spacebarBehavior = 'switchToTextMode'
themeIdentifier = 'com.brnbw.tuna.themes.NormieBar'

[[smartLinks.entries]]
enabled = true
name = 'DuckDuckGo'
template = 'https://duckduckgo.com/?q={{input}}'

[[smartLinks.entries]]
enabled = true
name = 'GIF'
template = 'https://giphy.com/search/{{input}}'

[[smartLinks.entries]]
enabled = true
name = 'YouTube'
template = 'https://www.youtube.com/results?search_query={{input}}'

[[catalogSettings]]
catalogIdentifier = 'TunaCore.TextActionsCatalog'

    [catalogSettings.values]
    TextActionsFileExtension = 'txt'

[[catalogSettings]]
catalogIdentifier = 'TunaEmoji.EmojiCatalog'

    [catalogSettings.values]
    EmojiSkinTone = 'default'

[[catalogSettings]]
catalogIdentifier = 'com.brnbw.tuna.plugins.emoji'

    [catalogSettings.values]
    EmojiSkinTone = 'default'

[[catalogSettings]]
catalogIdentifier = 'com.brnbw.tuna.themes.default'

    [catalogSettings.values]
    ThemeTint = 'system'