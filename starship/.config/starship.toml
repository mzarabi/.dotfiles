# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

add_newline = false


# Starship modules
[character]
success_symbol = '[➜](green)'
error_symbol = '[➜](green)'

[git_branch]
style = "bold mauve"

[git_status]
style = 'bold peach'

[git_metrics]
added_style = 'bold green'
deleted_style = 'bold red'

[directory]
truncation_length = 4
style = "bold lavender"

[package]
disabled = true

[java]
format = 'using [(${version} )]($style)'
style = 'bold red'
version_format = '${raw}'

[nodejs]
format = 'using [(${version} )]($style)'
detect_files = ['package.json']
style = 'bold green'
version_format = '${raw}'

[python]
format = 'using [(${version} )]($style)'
style = 'bold green'
version_format = '${raw}'
disabled = true

[docker_context]
disabled = true


[palettes.catppuccin_mocha]
